name: Auto Cron Jobs

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 mins — sweet spot
  workflow_dispatch:

jobs:
  auto-accept:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-accept cron
        run: |
          response=$(curl -L -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.APP_URL }}/api/cron/auto-accept" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "Response status: $response"
          if [ "$response" != "200" ]; then
            echo "❌ Auto-accept failed with status $response"
            exit 1
          fi
          echo "✅ Auto-accept completed"

  expire-queries:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger expire-queries cron
        run: |
          response=$(curl -L -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.APP_URL }}/api/cron/expire-queries" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "Response status: $response"
          if [ "$response" != "200" ]; then
            echo "❌ Expire-queries failed with status $response"
            exit 1
          fi
          echo "✅ Expire-queries completed"