name: Auto Cron Jobs

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  auto-accept:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-accept cron
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X GET "${{ secrets.APP_URL }}/api/cron/auto-accept" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          echo "Response Body:"
          echo "$body"

          echo "Response Status: $status"

          if [ "$status" != "200" ]; then
            echo "❌ Auto-accept failed"
            exit 1
          fi

          echo "✅ Auto-accept completed"

  expire-queries:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger expire-queries cron
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X GET "${{ secrets.APP_URL }}/api/cron/expire-queries" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          echo "Response Body:"
          echo "$body"

          echo "Response Status: $status"

          if [ "$status" != "200" ]; then
            echo "❌ Expire-queries failed"
            exit 1
          fi

          echo "✅ Expire-queries completed"
